<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📺 Sport TV</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0b0e14;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            padding: 20px;
        }
        .container {
            max-width: 1100px;
            width: 100%;
            background: #141a24;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
        }
        h1 {
            font-size: 1.8rem;
            margin-bottom: 20px;
            text-align: center;
        }
        .player-wrapper {
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            aspect-ratio: 16 / 9;
            width: 100%;
            margin-bottom: 20px;
            border: 1px solid #2a3346;
        }
        #videoPlayer {
            width: 100%;
            height: 100%;
            display: block;
            background: #000;
        }
        #status {
            padding: 12px;
            background: #1f2838;
            border-radius: 12px;
            text-align: center;
            color: #aab9d6;
            border-left: 4px solid #3b82f6;
        }
        #status span { color: #fff; font-weight: 600; }
        .channel-btn {
            display: block;
            width: 100%;
            max-width: 300px;
            margin: 20px auto 0;
            padding: 14px;
            background: #1c2536;
            border: 2px solid #3b82f6;
            border-radius: 14px;
            color: #fff;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            transition: 0.2s;
        }
        .channel-btn:hover {
            background: #26324a;
            transform: scale(1.02);
        }
    </style>
</head>
<body>
<div class="container">
    <h1>📺 SPORT TV 1</h1>
    <div class="player-wrapper">
        <video id="videoPlayer" controls playsinline></video>
    </div>
    <div id="status">⚡ Carregar canal</div>
    <button class="channel-btn" id="loadBtn">▶ Carregar Sport TV 1</button>
</div>

<script>
    const video = document.getElementById('videoPlayer');
    const statusDiv = document.getElementById('status');
    const loadBtn = document.getElementById('loadBtn');

    const streamUrl = "https://deviantart.lovetier.bz/SPT1/tracks-v1a1/mono.m3u8?token=U1BUMXxub19jaGVja19pcHwxNzgzODU2Nzk2.becebde911f56a9c9aea1836cf1bde7cb8c6c559af9366d28b3ec14fd78cbde8";

    let hls = null;

    function loadStream() {
        statusDiv.innerHTML = `📡 A carregar...`;

        if (hls) { hls.destroy(); hls = null; }

        if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = streamUrl;
            video.play().catch(() => statusDiv.innerHTML = `❌ Erro ao reproduzir` );
            statusDiv.innerHTML = `▶️ A reproduzir`;
            return;
        }

        if (Hls.isSupported()) {
            hls = new Hls({ enableWorker: true, lowLatencyMode: true });
            hls.loadSource(streamUrl);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => {
                video.play().catch(() => statusDiv.innerHTML = `⚠️ Clique no play para iniciar`);
                statusDiv.innerHTML = `▶️ A reproduzir`;
            });
            hls.on(Hls.Events.ERROR, () => {
                statusDiv.innerHTML = `❌ Stream offline ou link expirado`;
            });
        } else {
            statusDiv.innerHTML = `❌ Navegador não suporta HLS`;
        }
    }

    loadBtn.addEventListener('click', loadStream);

    // Carrega automaticamente ao abrir a página
    setTimeout(loadStream, 500);
</script>
</body>
</html>
